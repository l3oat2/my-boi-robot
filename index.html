<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boi Robot - หุ่นยนต์ส่งของอัจฉริยะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #000; }
        .gradient-bg { background: radial-gradient(circle at 80% 50%, #1a0505 0%, #000 100%); }
    </style>
</head>
<body class="text-white gradient-bg min-h-screen">
    <nav class="flex justify-between items-center p-8 max-w-7xl mx-auto">
        <div class="text-2xl font-bold flex items-center gap-2">
            <span class="text-red-600">◆</span> BOI ROBOT
        </div>
        <div class="hidden md:flex gap-8 text-sm text-gray-400">
            <a href="#" class="hover:text-white">คุณสมบัติ</a>
            <a href="#" class="hover:text-white">ข้อมูลจำเพาะ</a>
            <a href="#" class="hover:text-white">ราคา</a>
        </div>
        <button class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-full text-sm font-bold shadow-lg shadow-red-900/20">
            จองเลยตอนนี้
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-8 pt-20 grid md:grid-cols-2 gap-12 items-center">
        <div class="space-y-6">
            <div class="inline-flex items-center gap-2 bg-red-950/30 border border-red-900/50 rounded-full px-4 py-1 text-xs text-red-500">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                ระบบควบคุมหุ่นยนต์อัจฉริยะรุ่นใหม่
            </div>
            <h1 class="text-6xl md:text-7xl font-bold leading-tight">
                ควบคุมได้<span class="text-red-600">เร็ว</span><br>เท่า ความคิด
            </h1>
            <p class="text-gray-400 text-lg max-w-md">
                Boi: หุ่นยนต์ส่งน้ำแพ็คและอาหารจากไรเดอร์ถึงหน้าห้องคอนโดคุณโดยเฉพาะ 
                ทำงานเร็วขึ้น สุขภาพดีขึ้น ไม่ต้องลงไปรับเองให้เหนื่อย
            </p>
            <div class="flex gap-4 pt-4">
                <button class="bg-red-600 hover:bg-red-700 px-8 py-4 rounded-full font-bold flex items-center gap-2 transition-all">
                    จองหุ่นยนต์ของคุณ <span>›</span>
                </button>
                <button class="bg-white/5 hover:bg-white/10 border border-white/10 px-8 py-4 rounded-full font-bold transition-all">
                    ▶ ชมการสาธิต
                </button>
            </div>
        </div>

        <div class="relative">
            <div class="bg-zinc-900 rounded-3xl p-8 aspect-square flex items-center justify-center border border-white/5 shadow-2xl">
                <img src="https://via.placeholder.com/600x600/111/fff?text=BOI+ROBOT" alt="Boi Robot" class="rounded-2xl shadow-inner">
                
                <div class="absolute bottom-12 left-12 right-12 bg-black/80 backdrop-blur-md p-6 rounded-2xl border border-white/10 flex justify-between">
                    <div>
                        <div class="text-xs text-gray-500 uppercase">สถานะการส่ง</div>
                        <div class="text-xl font-bold">12 <span class="text-xs text-gray-500 font-normal">นาทีถึงเป้าหมาย</span></div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-500 uppercase">แบตเตอรี่</div>
                        <div class="text-xl font-bold text-green-500">98%</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
